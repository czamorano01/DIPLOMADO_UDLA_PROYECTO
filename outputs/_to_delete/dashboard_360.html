function esperar(ms) {
  return new Promise(resolve => {
    const inicio = performance.now();
    function verificar() {
      if (saltarFlag || performance.now() - inicio >= ms) resolve();
      else requestAnimationFrame(verificar);
    }
    verificar();
  });
}

function descargarTextoComoArchivo(texto, nombreArchivo, tipoMime) {
  const blob = new Blob([texto], { type: tipoMime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = nombreArchivo; a.click();
  URL.revokeObjectURL(url);
}

function arrayObjetosACSV(filas) {
  if (!filas || !filas.length) return '';
  const columnas = Object.keys(filas[0]);
  const lineas = [columnas.join(',')];
  for (const fila of filas) lineas.push(columnas.map(c => fila[c]).join(','));
  return lineas.join('\n');
}

function descargarCanvasComoJPEG(canvas, nombreArchivo) {
  const tmp = document.createElement('canvas');
  tmp.width = canvas.width; tmp.height = canvas.height;
  const ctx = tmp.getContext('2d');
  ctx.fillStyle = '#0a0e0d';
  ctx.fillRect(0, 0, tmp.width, tmp.height);
  ctx.drawImage(canvas, 0, 0);
  const a = document.createElement('a');
  a.href = tmp.toDataURL('image/jpeg', 0.92);
  a.download = nombreArchivo;
  a.click();
}

const canvas = document.getElementById('escena-canvas');
const ctx2d = canvas.getContext('2d');

const METRICAS_PREDEFINIDAS = {
  volumen: { campo: 'score_volumen', colorHex: '#3b82f6', titulo: 'Volumen de pedidos' },
  satisfaccion: { campo: 'score_satisfaccion', colorHex: '#d946ef', titulo: 'Satisfacción' },
};

let metricasSeleccionadas = [METRICAS_PREDEFINIDAS.volumen, METRICAS_PREDEFINIDAS.satisfaccion];
let particulasActivas = [];
let arcosActivos = [];
let nodosActivos = [];
const ESCENA_TAMANO = 90;

function ajustarCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

ajustarCanvas();

function limpiarEscena2D() {
  particulasActivas = [];
  arcosActivos = [];
  nodosActivos = [];
  ctx2d.clearRect(0, 0, canvas.width, canvas.height);
}

function colorPorIndice(indice) {
  const t = Math.max(0, Math.min(100, indice)) / 100;
  const c1 = [239, 68, 68];
  const c2 = [245, 158, 11];
  const c3 = [34, 197, 94];
  let r, g, b;
  if (t < 0.5) {
    const u = t / 0.5;
    r = Math.round(c1[0] + (c2[0] - c1[0]) * u);
    g = Math.round(c1[1] + (c2[1] - c1[1]) * u);
    b = Math.round(c1[2] + (c2[2] - c1[2]) * u);
  } else {
    const u = (t - 0.5) / 0.5;
    r = Math.round(c2[0] + (c3[0] - c2[0]) * u);
    g = Math.round(c2[1] + (c3[1] - c2[1]) * u);
    b = Math.round(c2[2] + (c3[2] - c2[2]) * u);
  }
  return `rgb(${r},${g},${b})`;
}

function calcularBounds(flujos) {
  const lats = [];
  const lngs = [];
  for (const f of flujos) {
    lats.push(f.lat_origen, f.lat_destino);
    lngs.push(f.lng_origen, f.lng_destino);
  }
  return {
    latMin: Math.min(...lats),
    latMax: Math.max(...lats),
    lngMin: Math.min(...lngs),
    lngMax: Math.max(...lngs),
  };
}

function proyectar(lat, lng, bounds) {
  const rangoLat = Math.max(bounds.latMax - bounds.latMin, 0.0001);
  const rangoLng = Math.max(bounds.lngMax - bounds.lngMin, 0.0001);
  const rango = Math.max(rangoLat, rangoLng);
  const x = ((lng - (bounds.lngMin + bounds.lngMax) / 2) / rango) * ESCENA_TAMANO;
  const y = -((lat - (bounds.latMin + bounds.latMax) / 2) / rango) * ESCENA_TAMANO;
  return {
    x: canvas.width * 0.5 + x * 0.8,
    y: canvas.height * 0.5 + y * 0.8,
  };
}

function normalizarScore(valor) { return Math.max(0.12, Math.min(1, valor / 100)); }

function construirEscenaDesdeFlujos(flujos, metricas) {
  limpiarEscena2D();
  if (!flujos.length) return {};

  const flujosVisibles = flujos.length > 80 ? flujos.slice(0, 80) : flujos;
  const bounds = calcularBounds(flujosVisibles);

  const nodos = new Map();
  function registrarNodo(nombre, lat, lng, volumen, indice) {
    const key = nombre;
    if (!nodos.has(key)) nodos.set(key, { nombre, lat, lng, volumen: 0, sumaIndice: 0, n: 0 });
    const n = nodos.get(key);
    n.volumen += volumen; n.sumaIndice += indice; n.n += 1;
  }

  for (const f of flujos) {
    registrarNodo(f.seller_state || f.seller_city, f.lat_origen, f.lng_origen, f.volumen, f.indice_desempeno);
    registrarNodo(f.customer_state || f.customer_city, f.lat_destino, f.lng_destino, f.volumen, f.indice_desempeno);
  }

  const volMax = Math.max(...[...nodos.values()].map(n => n.volumen), 1);
  for (const n of nodos.values()) {
    const { x, y } = proyectar(n.lat, n.lng, bounds);
    const indiceProm = n.sumaIndice / n.n;
    const radio = 4 + 16 * Math.sqrt(n.volumen / volMax);
    nodosActivos.push({ x, y, color: colorPorIndice(indiceProm), radio });
  }

  const offsets = [-0.9, 0.9];
  for (const f of flujosVisibles) {
    const o = proyectar(f.lat_origen, f.lng_origen, bounds);
    const d = proyectar(f.lat_destino, f.lng_destino, bounds);
    const dx = d.x - o.x, dy = d.y - o.y;
    const dist = Math.hypot(dx, dy);
    const px = dist < 1 ? 0 : -dy / dist;
    const py = dist < 1 ? 1 : dx / dist;
    const alturaArco = Math.max(40, dist * 0.25);

    metricas.forEach((m, i) => {
      const off = offsets[i];
      const p0 = { x: o.x + px * off * 18, y: o.y + py * off * 18 };
      const p2 = { x: d.x + px * off * 18, y: d.y + py * off * 18 };
      const p1 = { x: (o.x + d.x) / 2 + px * off * 12, y: (o.y + d.y) / 2 - alturaArco };
      const score = normalizarScore(f[m.campo]);
      const color = m.colorHex;
      arcosActivos.push({ p0, p1, p2, color, opacity: 0.15 + 0.55 * score, width: 2 + score * 2 });
      particulasActivas.push({ curva: { p0, p1, p2 }, velocidad: 0.0008 + 0.0009 * score, fase: Math.random(), color, radius: 3 + score * 2 });
    });
  }

  const ranking = [...nodos.values()].sort((a, b) => (b.sumaIndice / b.n) - (a.sumaIndice / a.n)).slice(0, 5);
  const cont = document.getElementById('ranking-indice');
  cont.innerHTML = '<b style="color:#eafff2; font-size:11.5px;">Índice de desempeño — top 5</b>' +
    ranking.map(n => `<div><span>${n.nombre}</span><span>${(n.sumaIndice / n.n).toFixed(1)}</span></div>`).join('');

  return { bounds };
}

function puntoBezier(p0, p1, p2, t) {
  const u = 1 - t;
  return {
    x: u * u * p0.x + 2 * u * t * p1.x + t * t * p2.x,
    y: u * u * p0.y + 2 * u * t * p1.y + t * t * p2.y,
  };
}

function actualizarParticulas() {
  const t = performance.now();
  for (const p of particulasActivas) {
    const u = (t * p.velocidad + p.fase) % 1;
    p.pos = puntoBezier(p.curva.p0, p.curva.p1, p.curva.p2, u);
  }
}

function renderEscena2D() {
  ctx2d.clearRect(0, 0, canvas.width, canvas.height);
  ctx2d.fillStyle = 'rgba(10,14,13,0.16)';
  ctx2d.fillRect(0, 0, canvas.width, canvas.height);

  ctx2d.lineCap = 'round';
  ctx2d.lineJoin = 'round';
  for (const arco of arcosActivos) {
    ctx2d.beginPath();
    ctx2d.moveTo(arco.p0.x, arco.p0.y);
    ctx2d.quadraticCurveTo(arco.p1.x, arco.p1.y, arco.p2.x, arco.p2.y);
    ctx2d.strokeStyle = arco.color;
    ctx2d.globalAlpha = arco.opacity;
    ctx2d.lineWidth = arco.width;
    ctx2d.stroke();
  }
  ctx2d.globalAlpha = 1;

  for (const nodo of nodosActivos) {
    ctx2d.beginPath();
    ctx2d.arc(nodo.x, nodo.y, nodo.radio, 0, Math.PI * 2);
    ctx2d.fillStyle = nodo.color;
    ctx2d.fill();
    ctx2d.strokeStyle = 'rgba(255,255,255,0.14)';
    ctx2d.lineWidth = 1;
    ctx2d.stroke();
  }

  for (const p of particulasActivas) {
    if (!p.pos) continue;
    ctx2d.beginPath();
    ctx2d.arc(p.pos.x, p.pos.y, p.radius, 0, Math.PI * 2);
    ctx2d.fillStyle = p.color;
    ctx2d.fill();
  }
}

function animar() {
  requestAnimationFrame(animar);
  actualizarParticulas();
  renderEscena2D();
}
animar();

function dibujarHeatmapCorrelacion(canvas, columnas, matriz) {
  canvas.width = 260; canvas.height = 220;
  const ctx = canvas.getContext('2d');
  const margenIzq = 62, margenSup = 14, n = columnas.length;
  const celda = Math.min((canvas.width - margenIzq) / n, (canvas.height - margenSup) / n);
  ctx.font = '9px sans-serif';
  for (let i = 0; i < n; i++) {
    for (let j = 0; j < n; j++) {
      const v = matriz[i][j];
      const t = (v + 1) / 2;
      const c1 = [239, 68, 68], c2 = [34, 197, 94];
      const r = Math.round(c1[0] + (c2[0] - c1[0]) * t);
      const g = Math.round(c1[1] + (c2[1] - c1[1]) * t);
      const b = Math.round(c1[2] + (c2[2] - c1[2]) * t);
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(margenIzq + j * celda, margenSup + i * celda, celda - 2, celda - 2);
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.fillText(v.toFixed(2), margenIzq + j * celda + 4, margenSup + i * celda + celda / 2 + 3);
    }
    ctx.fillStyle = '#b9c7c0';
    ctx.fillText(columnas[i].slice(0, 9), 2, margenSup + i * celda + celda / 2 + 3);
  }
}

const registroDescargas = {};

function registrarPanel(id, filasCSV) {
  registroDescargas[id] = filasCSV;
  const card = document.getElementById('card-' + id);
  card.querySelector('[data-accion="csv"]').addEventListener('click', () => {
    descargarTextoComoArchivo(arrayObjetosACSV(registroDescargas[id]), id + '.csv', 'text/csv');
  });
  card.querySelector('[data-accion="jpeg"]').addEventListener('click', () => {
    descargarCanvasComoJPEG(document.getElementById('canvas-' + id), id + '.jpeg');
  });
}

function construirPaneles() {
  const contenedor = document.getElementById('sidebar-paneles');
  const paneles = [];

  function construirCuandoVisible(card, panel) {
    const observer = new IntersectionObserver((entries, obs) => {
      for (const entry of entries) {
        if (entry.isIntersecting) {
          const canvas = card.querySelector('canvas');
          panel.build(canvas);
          obs.unobserve(card);
          card.classList.add('visible');
        }
      }
    }, { root: contenedor, threshold: 0.35 });
    observer.observe(card);
  }

  // 1. dispersión distancia vs tiempo de entrega
  paneles.push({ id: 'distancia_vs_entrega', titulo: 'Distancia vs. días de entrega', build: (canvas) => {
    new Chart(canvas, { type: 'scatter', data: { datasets: [{ data: DATA.stats.dispersion_distancia_entrega.map(d => ({ x: d.distancia_km, y: d.dias_entrega, r: Math.max(1, Math.log2(d.count + 1)) })), backgroundColor: 'rgba(59,130,246,0.5)', pointRadius: (ctx) => ctx.raw.r || 2 }] },
      options: { plugins: { legend: { display: false } }, scales: { x: { title: { display: true, text: 'km' } }, y: { title: { display: true, text: 'días' } } } } });
    registrarPanel('distancia_vs_entrega', DATA.stats.dispersion_distancia_entrega);
  }});

  // 2. dispersión distancia vs flete
  paneles.push({ id: 'distancia_vs_flete', titulo: 'Distancia vs. costo de flete', build: (canvas) => {
    new Chart(canvas, { type: 'scatter', data: { datasets: [{ data: DATA.stats.dispersion_distancia_flete.map(d => ({ x: d.distancia_km, y: d.freight_value, r: Math.max(1, Math.log2(d.count + 1)) })), backgroundColor: 'rgba(245,158,11,0.5)', pointRadius: (ctx) => ctx.raw.r || 2 }] },
      options: { plugins: { legend: { display: false } }, scales: { x: { title: { display: true, text: 'km' } }, y: { title: { display: true, text: 'R$' } } } } });
    registrarPanel('distancia_vs_flete', DATA.stats.dispersion_distancia_flete);
  }});

  // 3. atraso vs satisfacción
  paneles.push({ id: 'atraso_vs_satisfaccion', titulo: 'Atraso vs. satisfacción', build: (canvas) => {
    const d = DATA.stats.atraso_vs_satisfaccion;
    new Chart(canvas, { type: 'bar', data: { labels: d.map(x => x.bucket_atraso), datasets: [{ data: d.map(x => x.review_prom), backgroundColor: '#d946ef' }] },
      options: { plugins: { legend: { display: false } }, scales: { x: { ticks: { font: { size: 8 } } }, y: { title: { display: true, text: 'review prom.' } } } } });
    registrarPanel('atraso_vs_satisfaccion', d);
  }});

  // 4. matriz de correlación
  paneles.push({ id: 'matriz_correlacion', titulo: 'Correlación entre variables', build: (canvas) => {
    dibujarHeatmapCorrelacion(canvas, DATA.stats.matriz_correlacion.columnas, DATA.stats.matriz_correlacion.datos);
    const filas = DATA.stats.matriz_correlacion.columnas.map((c, i) => {
      const fila = { variable: c };
      DATA.stats.matriz_correlacion.columnas.forEach((c2, j) => fila[c2] = DATA.stats.matriz_correlacion.datos[i][j]);
      return fila;
    });
    registrarPanel('matriz_correlacion', filas);
  }});

  // 5. serie de tiempo de ventas
  paneles.push({ id: 'serie_tiempo_ventas', titulo: 'GMV mensual', build: (canvas) => {
    const d = DATA.stats.serie_tiempo_ventas;
    new Chart(canvas, { type: 'line', data: { labels: d.map(x => x.mes_compra), datasets: [{ data: d.map(x => x.gmv), borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,0.15)', fill: true, tension: 0.3, pointRadius: 0 }] },
      options: { plugins: { legend: { display: false } }, scales: { x: { ticks: { font: { size: 7 }, maxRotation: 90 } } } } });
    registrarPanel('serie_tiempo_ventas', d);
  }});

  // 6. top categorías
  paneles.push({ id: 'top_categorias', titulo: 'Top categorías (ticket promedio)', build: (canvas) => {
    const d = DATA.stats.top_categorias;
    new Chart(canvas, { type: 'bar', data: { labels: d.map(x => x.product_category_name_english), datasets: [{ data: d.map(x => x.ticket_prom), backgroundColor: '#3b82f6' }] },
      options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { y: { ticks: { font: { size: 7.5 } } } } } });
    registrarPanel('top_categorias', d);
  }});

  // 7. métodos de pago
  paneles.push({ id: 'metodos_pago', titulo: 'Métodos de pago', build: (canvas) => {
    const d = DATA.stats.metodos_pago;
    new Chart(canvas, { type: 'doughnut', data: { labels: d.map(x => x.payment_type), datasets: [{ data: d.map(x => x.n_pagos), backgroundColor: ['#3b82f6', '#22c55e', '#f59e0b', '#d946ef', '#94a3b8'] }] },
      options: { plugins: { legend: { position: 'bottom', labels: { font: { size: 8.5 }, boxWidth: 8 } } } } });
    registrarPanel('metodos_pago', d);
  }});

  // 8. top estados por GMV
  paneles.push({ id: 'top_estados_gmv', titulo: 'Top estados por GMV', build: (canvas) => {
    const d = DATA.stats.top_estados_gmv;
    new Chart(canvas, { type: 'bar', data: { labels: d.map(x => x.customer_state), datasets: [{ data: d.map(x => x.gmv), backgroundColor: '#22c55e' }] },
      options: { indexAxis: 'y', plugins: { legend: { display: false } } } });
    registrarPanel('top_estados_gmv', d);
  }});

  paneles.forEach(p => {
    const card = crearCard(p.id, p.titulo);
    contenedor.appendChild(card);
    construirCuandoVisible(card, p);
  });
  return paneles;
}

async function revelarPaneles(paneles, delayMs = 120) {
  for (const p of paneles) {
    document.getElementById('card-' + p.id).classList.add('visible');
    await esperar(delayMs);
  }
}

/* ---------------------------------------------------------------------- */
/* Ruleta final                                                            */
/* ---------------------------------------------------------------------- */

function iniciarRuleta(paneles) {
  document.getElementById('sidebar-paneles').classList.add('oculto-clase');
  const contenedor = document.getElementById('ruleta-contenedor');
  const ring = document.getElementById('ruleta-ring');
  contenedor.classList.add('activa');

  const n = paneles.length;
  const radio = 420;
  paneles.forEach((p, i) => {
    const original = document.getElementById('card-' + p.id);
    original.classList.remove('card-panel');
    original.classList.add('card-ruleta');
    original.style.transform = `rotateY(${(360 / n) * i}deg) translateZ(${radio}px)`;
    ring.appendChild(original);
  });
}

/* ---------------------------------------------------------------------- */
/* Disolución matrix (tecla Enter)                                         */
/* ---------------------------------------------------------------------- */

let matrixActivo = false;
function iniciarDisolucionMatrix() {
  if (matrixActivo) return;
  matrixActivo = true;
  saltarFlag = true;

  document.getElementById('app-ui').style.opacity = '0';

  const mc = document.getElementById('matrix-canvas');
  mc.classList.remove('oculto');
  mc.width = window.innerWidth; mc.height = window.innerHeight;
  mc.style.opacity = '1';
  const ctx = mc.getContext('2d');
  const fontSize = 16;
  const columnas = Math.floor(mc.width / fontSize);
  const gotas = new Array(columnas).fill(1);

  const intervalo = setInterval(() => {
    ctx.fillStyle = 'rgba(5,8,6,0.08)';
    ctx.fillRect(0, 0, mc.width, mc.height);
    ctx.fillStyle = '#22c55e';
    ctx.font = fontSize + 'px monospace';
    for (let i = 0; i < gotas.length; i++) {
      const texto = Math.random() > 0.5 ? '1' : '0';
      ctx.fillText(texto, i * fontSize, gotas[i] * fontSize);
      if (gotas[i] * fontSize > mc.height && Math.random() > 0.975) gotas[i] = 0;
      gotas[i]++;
    }
  }, 45);

  setTimeout(() => {
    canvas.remove();
    const msg = document.createElement('div');
    msg.id = 'mensaje-final';
    msg.innerText = 'Fin de la demo — Geografía de ventas & Dashboard 360 · Olist Brazilian E-commerce';
    document.body.appendChild(msg);
  }, 4500);
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') iniciarDisolucionMatrix();
});

/* ---------------------------------------------------------------------- */
/* Secuencia automática                                                     */
/* ---------------------------------------------------------------------- */

let saltarFlag = false;
document.getElementById('btn-saltar').addEventListener('click', () => { saltarFlag = true; });

async function iniciarSecuencia() {
  const etiqueta = document.getElementById('etiqueta-escena');

  etiqueta.textContent = 'Vista nacional: corrientes de pedidos entre estados';
  construirEscenaDesdeFlujos(DATA.flujos_nacionales, metricasSeleccionadas);
  await esperar(600);

  etiqueta.textContent = 'Haciendo zoom al entorno urbano de São Paulo…';
  construirEscenaDesdeFlujos(DATA.flujos_urbanos, metricasSeleccionadas);
  await esperar(900);

  etiqueta.textContent = 'Zoom urbano: São Paulo — flujos entre zonas de la ciudad';
  await esperar(400);

  etiqueta.textContent = 'Análisis estadístico de las variables del negocio';
  const paneles = construirPaneles();
  await revelarPaneles(paneles, 120);

  etiqueta.textContent = 'Ruleta de análisis — descarga CSV y JPEG desde cada tarjeta';
  saltarFlag = false;
  iniciarRuleta(paneles);
}
